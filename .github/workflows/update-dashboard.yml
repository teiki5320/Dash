name: Update Dash Dashboard

on:
  schedule:
    - cron: '0 */6 * * *'   # toutes les 6h
  workflow_dispatch:          # déclenchement manuel
  push:
    branches: [main]
    paths:
      - 'data/projects.json'
      - 'scripts/**'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate projects data
        run: node scripts/generate-data.js
        env:
          GH_TOKEN: ${{ secrets.DASH_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name "Dash Bot"
          git config user.email "dash-bot@users.noreply.github.com"
          git add projects-data.json
          git diff --staged --quiet || git commit -m "🤖 Auto-update: $(date -u +%Y-%m-%d_%H:%M)"
          git push
