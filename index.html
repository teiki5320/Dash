<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drama — Dashboard de production</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="title-block">
      <h1>Drama <span class="muted">— Dashboard</span></h1>
      <p class="subtitle">208 semaines · 4 saisons · suivi scènes / personnages / photos</p>
    </div>
    <div class="global-progress" id="globalProgress"></div>
  </header>

  <nav class="tabs" id="mainTabs">
    <button class="tab active" data-tab="overview">Vue d'ensemble</button>
    <button class="tab" data-tab="s1">Saison 1</button>
    <button class="tab" data-tab="s2">Saison 2</button>
    <button class="tab" data-tab="s3">Saison 3</button>
    <button class="tab" data-tab="s4">Saison 4</button>
    <button class="tab" data-tab="lore">Lore &amp; Endings</button>
  </nav>

  <main id="content"></main>

  <footer class="footer">
    <span>Source de vérité : <a href="https://github.com/teiki5320/drama/blob/main/ROADMAP.md" target="_blank" rel="noopener">drama/ROADMAP.md</a></span>
    <span class="sep">·</span>
    <button id="resetLocal" class="link-btn" title="Efface les statuts photos / notes locaux">Réinitialiser le local</button>
    <span class="sep">·</span>
    <button id="exportAll" class="link-btn" title="Exporte l'état courant en JSON">Export JSON complet</button>
  </footer>

  <!-- Modale scène -->
  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
