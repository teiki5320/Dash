<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dash — teiki5320</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --accent:    #58a6ff;
      --green:     #3fb950;
      --yellow:    #d29922;
      --red:       #f85149;
      --radius:    12px;
      --shadow:    0 4px 24px rgba(0,0,0,.4);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1.5rem 4rem;
      line-height: 1.6;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      max-width: 900px;
      margin: 0 auto 2.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header-title h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -.5px;
    }

    .header-title h1 span {
      color: var(--accent);
    }

    .header-title p {
      color: var(--muted);
      font-size: .85rem;
      margin-top: .2rem;
    }

    #lastUpdate {
      color: var(--muted);
      font-size: .78rem;
      white-space: nowrap;
    }

    /* ── Stats bar ───────────────────────────────────────────────── */
    #stats {
      max-width: 900px;
      margin: 0 auto 2rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .9rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: .15rem;
      min-width: 120px;
    }

    .stat-value {
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: .75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    /* ── Projects grid ───────────────────────────────────────────── */
    #projects {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 1.25rem;
    }

    @media (max-width: 520px) {
      #projects { grid-template-columns: 1fr; }
    }

    /* ── Project card ────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem;
      display: flex;
      flex-direction: column;
      gap: .9rem;
      box-shadow: var(--shadow);
      transition: border-color .2s, transform .15s;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: .75rem;
    }

    .card-title {
      display: flex;
      flex-direction: column;
      gap: .2rem;
    }

    .card-name {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .card-category {
      font-size: .72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .badge {
      font-size: .7rem;
      font-weight: 600;
      padding: .2em .65em;
      border-radius: 20px;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .badge.active  { background: rgba(63,185,80,.15);  color: var(--green);  border-color: rgba(63,185,80,.3); }
    .badge.paused  { background: rgba(210,153,34,.15); color: var(--yellow); border-color: rgba(210,153,34,.3); }
    .badge.blocked { background: rgba(248,81,73,.15);  color: var(--red);    border-color: rgba(248,81,73,.3); }

    /* ── Energy badge ────────────────────────────────────────── */
    .energy {
      font-size: .68rem;
      font-weight: 600;
      padding: .15em .55em;
      border-radius: 20px;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .energy.high   { background: rgba(63,185,80,.15);  color: var(--green);  border-color: rgba(63,185,80,.3); }
    .energy.medium { background: rgba(210,153,34,.15); color: var(--yellow); border-color: rgba(210,153,34,.3); }
    .energy.low    { background: rgba(88,166,255,.1);  color: var(--muted);  border-color: var(--border); }

    /* ── Last session ────────────────────────────────────────── */
    .last-session {
      font-size: .76rem;
      color: var(--muted);
      line-height: 1.6;
      padding: .5rem .75rem;
      background: rgba(255,255,255,.03);
      border-left: 2px solid var(--border);
      border-radius: 0 6px 6px 0;
    }
    .last-session strong {
      display: block;
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      margin-bottom: .3rem;
    }
    .last-session ul { margin: 0; padding: 0; list-style: none; }
    .last-session ul li::before { content: "· "; opacity: .5; }

    /* ── Relaunch button ─────────────────────────────────────── */
    .relaunch-btn {
      font-size: .73rem;
      background: rgba(63,185,80,.08);
      border: 1px solid rgba(63,185,80,.25);
      color: var(--green);
      border-radius: 6px;
      padding: .3em .8em;
      cursor: pointer;
      transition: background .15s;
      font-family: 'SF Mono', 'Monaco', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .relaunch-btn:hover { background: rgba(63,185,80,.15); }

    /* ── Blockers ────────────────────────────────────────────── */
    .blocker-msg {
      font-size: .77rem;
      color: var(--red);
      background: rgba(248,81,73,.08);
      border: 1px solid rgba(248,81,73,.2);
      border-radius: 6px;
      padding: .4rem .75rem;
    }
    .blocker-msg strong {
      display: block;
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: .2rem;
      opacity: .7;
    }

    .card-desc {
      font-size: .84rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── Progress ────────────────────────────────────────────────── */
    .progress-wrap {
      display: flex;
      flex-direction: column;
      gap: .35rem;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      font-size: .75rem;
      color: var(--muted);
    }

    .progress-bar-bg {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 3px;
      transition: width .6s ease;
    }

    /* ── Next tasks ──────────────────────────────────────────────── */
    .next-tasks {
      background: rgba(88,166,255,.07);
      border: 1px solid rgba(88,166,255,.2);
      border-radius: 8px;
      padding: .6rem .85rem;
      display: flex;
      flex-direction: column;
      gap: .3rem;
    }

    .next-tasks strong {
      display: block;
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: .15rem;
    }

    .next-tasks ol {
      margin: 0;
      padding-left: 1.1rem;
      list-style: decimal;
    }

    .next-tasks ol li {
      font-size: .78rem;
      color: var(--accent);
      line-height: 1.5;
    }

    .next-tasks ol li + li {
      color: var(--muted);
    }

    /* ── Footer meta ─────────────────────────────────────────────── */
    .card-meta {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
      font-size: .76rem;
      color: var(--muted);
    }

    .meta-item { display: flex; align-items: center; gap: .3rem; }

    .card-links {
      display: flex;
      gap: .6rem;
      flex-wrap: wrap;
    }

    .card-links a {
      font-size: .76rem;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid rgba(88,166,255,.3);
      border-radius: 6px;
      padding: .25em .7em;
      transition: background .15s, border-color .15s;
    }

    .card-links a:hover {
      background: rgba(88,166,255,.1);
      border-color: var(--accent);
    }

    /* ── Loading / error states ──────────────────────────────────── */
    .state-msg {
      max-width: 900px;
      margin: 3rem auto;
      text-align: center;
      color: var(--muted);
      font-size: .9rem;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header>
    <div class="header-title">
      <h1>⚡ <span>Dash</span></h1>
      <p>Tableau de bord des projets GitHub — @teiki5320</p>
    </div>
    <span id="lastUpdate">Chargement…</span>
  </header>

  <div id="stats"></div>
  <div id="projects"></div>

  <script>
    // ── Data ─────────────────────────────────────────────────────────────────
    let PROJECTS = [];

    // ── Render Stats ─────────────────────────────────────────────────────────
    function renderStats() {
      const el = document.getElementById('stats');
      const total   = PROJECTS.length;
      const active  = PROJECTS.filter(p => p.status === 'active').length;
      const issues  = PROJECTS.reduce((s, p) => s + (p.openIssues || 0), 0);
      const avgProg = total > 0
        ? Math.round(PROJECTS.reduce((s, p) => s + (p.progress || 0), 0) / total)
        : 0;

      el.innerHTML = [
        { value: total,   label: 'Projet'   + (total > 1 ? 's' : '') },
        { value: active,  label: 'Actif'    + (active > 1 ? 's' : '') },
        { value: issues,  label: 'Issue'    + (issues !== 1 ? 's' : '') },
        { value: avgProg + '%', label: 'Progression moy.' },
      ].map(s => `
        <div class="stat-card">
          <span class="stat-value">${s.value}</span>
          <span class="stat-label">${s.label}</span>
        </div>
      `).join('');
    }

    // ── Render Projects ───────────────────────────────────────────────────────
    function renderProjects() {
      const el = document.getElementById('projects');

      if (!PROJECTS.length) {
        el.innerHTML = '<p class="state-msg">Aucun projet à afficher.</p>';
        return;
      }

      el.innerHTML = PROJECTS.map(p => {
        const energyLabel = { high: '🔋 Actif', medium: '🔋 Moyen', low: '🔋 Faible' }[p.energy] || '';
        const sessions = (p.lastSession || []).slice(0, 4);
        const tasks = p.nextTasks?.length ? p.nextTasks : (p.nextTask && p.nextTask !== 'À définir' ? [p.nextTask] : []);

        return `
        <div class="card">
          <div class="card-header">
            <div class="card-title">
              <span class="card-name">${p.name}</span>
              <span class="card-category">${p.category || ''}</span>
            </div>
            <div style="display:flex;gap:.4rem;align-items:center;flex-wrap:wrap">
              ${p.energy ? `<span class="energy ${p.energy}">${energyLabel}</span>` : ''}
              <span class="badge ${p.status || 'paused'}">${p.statusLabel || p.status}</span>
            </div>
          </div>

          <p class="card-desc">${p.summary || p.description || ''}</p>

          ${sessions.length ? `
            <div class="last-session">
              <strong>🔙 Dernière session</strong>
              <ul>${sessions.map(s => `<li>${s}</li>`).join('')}</ul>
            </div>
          ` : ''}

          ${tasks.length ? `
            <div class="next-tasks">
              <strong>▶️ Tâches prioritaires</strong>
              <ol>${tasks.map(t => `<li>${t}</li>`).join('')}</ol>
            </div>
          ` : ''}

          ${p.blockers ? `
            <div class="blocker-msg">
              <strong>⚠️ Bloqueur</strong>
              ${p.blockers}
            </div>
          ` : ''}

          ${p.progress > 0 ? `
            <div class="progress-wrap">
              <div class="progress-header">
                <span>Roadmap</span>
                <span>${p.progress}%</span>
              </div>
              <div class="progress-bar-bg">
                <div class="progress-bar-fill" style="width:${p.progress}%"></div>
              </div>
            </div>
          ` : ''}

          <div class="card-meta">
            <span class="meta-item">🕐 ${p.lastCommit || '—'}</span>
            <span class="meta-item">🐛 ${p.openIssues || 0} issue${(p.openIssues || 0) !== 1 ? 's' : ''}</span>
          </div>

          <div class="card-links" style="flex-wrap:wrap;gap:.5rem">
            ${p.relaunchCommand ? `<button class="relaunch-btn" onclick="navigator.clipboard.writeText('${p.relaunchCommand.replace(/'/g,"\\'")}').then(()=>this.textContent='✅ Copié!').then(()=>setTimeout(()=>this.textContent='🚀 ${p.relaunchCommand.slice(0,30)}...',1500))" title="${p.relaunchCommand}">🚀 ${p.relaunchCommand.slice(0,35)}${p.relaunchCommand.length>35?'...':''}</button>` : ''}
            ${p.githubUrl  ? `<a href="${p.githubUrl}"  target="_blank">GitHub →</a>` : ''}
            ${p.roadmapUrl ? `<a href="${p.roadmapUrl}" target="_blank">Roadmap →</a>` : ''}
          </div>
        </div>`;
      }).join('');
    }

    // ── Load Projects (dynamic) ───────────────────────────────────────────────
    async function loadProjects() {
      const projectsEl = document.getElementById('projects');
      const updateEl   = document.getElementById('lastUpdate');

      // Show spinner while loading
      projectsEl.innerHTML = `
        <div class="state-msg" style="grid-column:1/-1">
          <div class="spinner"></div>
          Chargement des projets…
        </div>`;

      try {
        const res = await fetch('projects-data.json?t=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        PROJECTS = data.projects || [];
        renderStats();
        renderProjects();

        if (updateEl && data.generatedAt) {
          const d = new Date(data.generatedAt);
          updateEl.textContent = 'Mise à jour : ' + d.toLocaleDateString('fr-FR', {
            day: 'numeric', month: 'long', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
          });
        } else if (updateEl) {
          updateEl.textContent = '';
        }
      } catch (err) {
        console.error('Erreur loadProjects:', err);
        projectsEl.innerHTML = `
          <div class="state-msg" style="grid-column:1/-1">
            ⚠️ Impossible de charger <code>projects-data.json</code>.<br>
            Lance <code>node scripts/generate-data.js</code> pour le générer.
          </div>`;
        if (updateEl) updateEl.textContent = 'Erreur de chargement';
      }
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    loadProjects();
  </script>

</body>
</html>
